<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 220px;
            margin: 0;
            padding: 14px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #1b1d1f;
            color: #e7edf2;
        }

        h2 {
            margin: 0 0 4px 0;
            font-size: 15px;
            font-weight: 600;
        }

        p {
            margin: 0 0 14px 0;
            font-size: 12px;
            color: #aeb8c2;
        }

        .btn {
            width: 100%;
            min-height: 30px;
            border: 1px solid #3f464c;
            border-radius: 4px;
            background: #26282b;
            color: #ffffff;
            cursor: pointer;
            font-size: 12px;
        }

        .btn:hover {
            background: #30343a;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .connected {
            color: #36c275;
        }

        .disconnected {
            color: #ff7272;
        }

        .site-box {
            margin-top: 14px;
            border-top: 1px solid #333940;
            padding-top: 12px;
        }

        #currentSite {
            font-size: 11px;
            margin-bottom: 8px;
            color: #aeb8c2;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <h2>Velocity Download Manager</h2>
    <p>Browser integration</p>
    <button class="btn" id="checkBtn">Check Connection</button>
    <div id="status" class="disconnected">Not connected</div>

    <div class="site-box">
        <div id="currentSite">-</div>
        <button class="btn" id="excludeBtn">Disable on this site</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
