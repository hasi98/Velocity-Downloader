<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 200px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 15px;
            text-align: center;
            background: #0a0e1a;
            color: #f1f5f9;
        }

        h2 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #818cf8;
        }

        p {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 10px;
            font-size: 12px;
            font-weight: bold;
        }

        .connected {
            color: #10b981;
        }

        .disconnected {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <h2>⚡ Velocity</h2>
    <p>Interceptor Extension 🚀</p>
    <button class="btn" id="checkBtn">Check Connection</button>
    <div id="status" class="disconnected">🔌 Not Connected</div>

    <div style="margin-top: 15px; border-top: 1px solid #1e293b; padding-top: 15px;">
        <div id="currentSite"
            style="font-size: 11px; margin-bottom: 8px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
            -</div>
        <button class="btn" id="excludeBtn" style="background: #1e293b;">Exclude Site</button>
    </div>

    <script src="popup.js"></script>
</body>

</html>
